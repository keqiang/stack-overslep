# Build in CI, deploy PREBUILT to Vercel. Skips Vercel's remote build (no build minutes billed).
# You keep CI control and still ship to Vercel prod, without a cloud build on every push.
#
# Secrets to set in the repo (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Deploy (prebuilt)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # Pull project settings + production env so the local build matches prod.
      - run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      # Build LOCALLY in the runner. This is the step Vercel would otherwise bill as build minutes.
      - run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      # Upload the prebuilt .vercel/output. Vercel does NOT rebuild.
      - run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
